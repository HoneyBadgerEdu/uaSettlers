media:
  input: src/assets
  output: ../assets
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content
    fields:
      - name: title
        type: string
      - name: description
        type: string
      - name: date
        type: date
      - name: image
        type: image
      - name: body
        type: rich-text
